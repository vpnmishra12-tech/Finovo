name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Capacitor 7 requires Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add and Sync Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      # 🔥 CRITICAL FIX: Inject AdMob App ID into AndroidManifest.xml to prevent crash
      - name: Inject AdMob App ID
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          APP_ID="ca-app-pub-9915809769396833~2579253457"
          if grep -q "com.google.android.gms.ads.APPLICATION_ID" "$MANIFEST_PATH"; then
            echo "AdMob ID already exists"
          else
            # Insert meta-data tag before the closing </application> tag
            sed -i "/<\/application>/i \        <meta-data android:name=\"com.google.android.gms.ads.APPLICATION_ID\" android:value=\"$APP_ID\"/>" "$MANIFEST_PATH"
            echo "AdMob ID injected successfully"
          fi

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/